### ASTF (TCP) load generator - vdev on port 0 (client side). Pairs with cfg_astf_server.yaml.
- port_limit      : 2
  version         : 2
  interfaces      : ["--vdev=net_virtio_user0,path=/tmp/trex-vhost.sock,server=1", "dummy"]
  zmq_pub_port    : 4520
  zmq_rpc_port    : 4521
  ext_dpdk_opt    : ["--iova-mode=va", "--single-file-segments"]
  port_info       :
        - ip         : 1.1.1.1
          default_gw : 1.1.1.2
        - ip         : 1.1.1.9
          default_gw : 1.1.1.1
