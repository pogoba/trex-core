### ASTF (TCP) server - vdev on port 1 (odd = server side, for --astf-server-only).
- port_limit      : 2
  version         : 2
  interfaces      : ["dummy", "--vdev=net_vhost0,iface=/tmp/trex-vhost.sock,client=1"]
  zmq_pub_port    : 4500
  zmq_rpc_port    : 4501
  ext_dpdk_opt    : ["--iova-mode=va"]
  port_info       :
        - ip         : 1.1.1.8
          default_gw : 1.1.1.1
        - ip         : 1.1.1.2
          default_gw : 1.1.1.1
